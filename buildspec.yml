version: 0.2


phases:

  install:
    commands:
      - echo Installing jq
      - yum install -y jq

  pre_build:
    commands:
      - echo Logging into ECR
      - |
          aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$ECR_REPO
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_URI=$REPOSITORY_URI:$IMAGE_TAG

  build:
    commands:
      - docker build -t $ECR_REPO .
      - docker tag $ECR_REPO:latest $IMAGE_URI

  post_build:
    commands:
      - docker push $IMAGE_URI
      - aws ecs describe-task-definition --task-definition $TASK_FAMILY --query "taskDefinition" > task-def.json

      - |
          jq --arg IMAGE "$IMAGE_URI" '
          .containerDefinitions[0].image = $IMAGE
          ' task-def.json | jq '
          del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )
          ' > new-task-def.json

      - NEW_TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://new-task-def.json --query "taskDefinition.taskDefinitionArn" --output text)

      - aws ecs update-service --cluster $CLUSTER_NAME --service $SERVICE_NAME --task-definition $NEW_TASK_DEF_ARN

artifacts:
  files:
    - '**/*'
